name: Build & Release APK

# التشغيل يتم عند الضغط يدوي أو عند عمل Push
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. تحميل الكود
    - uses: actions/checkout@v4

    # 2. تثبيت جافا 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. بناء التطبيق
    - name: Build with Gradle
      run: |
        chmod +x ./gradlew
        ./gradlew :app:assembleRelease

    # 4. إنشاء Release ورفع الملف تلقائياً
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        name: "الإصدار الجديد - ${{ github.run_number }}"
        tag_name: "v1.2.${{ github.run_number }}"
        body: "تم بناء هذا الإصدار تلقائياً من الكود المحدث."
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

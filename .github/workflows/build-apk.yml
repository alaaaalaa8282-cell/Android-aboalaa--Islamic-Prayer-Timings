name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'رقم الإصدار (مثال: v1.1)'
        required: true
        default: 'v1.0'
      release_name:
        description: 'اسم التحديث (مثال: تحسين الألوان)'
        required: true
        default: 'تحديث جديد'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleRelease
    
    # --- خطوة إنشاء الـ Release (بتشتغل لما تدوس Run Workflow يدوي) ---
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'workflow_dispatch'
      with:
        files: app/build/outputs/apk/release/*.apk
        tag_name: ${{ github.event.inputs.version_tag }}
        name: ${{ github.event.inputs.release_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # --- خطوة حفظ ملف مؤقت (بتشتغل لما تعمل Push عادي من الكود) ---
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      if: github.event_name == 'push'
      with:
        name: Islamic-Prayer-App
        path: app/build/outputs/apk/release/*.apk
